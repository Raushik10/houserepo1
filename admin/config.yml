backend:
  name: git-gateway
  branch: master   # or main (your branch)

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "properties"
    label: "Properties"
    files:
      - label: "Properties Data"
        name: "properties"
        file: "properties/properties.json"
        fields:
          - label: "Properties"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Price", name: "price", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

              - label: "Images"
                name: "images"
                widget: "list"
                field: { label: "Image", name: "image", widget: "image" }

              - { label: "Google Map URL", name: "map", widget: "string" }