<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Rental Apartments</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins',sans-serif; }
header { background:#111; color:#fff; padding:15px; display:flex; justify-content:space-between; }
nav a { color:#fff; margin:0 10px; text-decoration:none; }

.hero {
  height:90vh;
  background:url('https://images.unsplash.com/photo-1560448204-e02f11c3d0e2') center/cover;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  color:white; text-align:center;
}

.btn { background:#ff5a5f; color:white; padding:10px 20px; border:none; cursor:pointer; }

.container { padding:40px 20px; }

.cards {
  display:flex; gap:20px; flex-wrap:wrap; justify-content:center;
}

.card {
  width:300px; border-radius:10px; overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  cursor:pointer;
}

.card img { width:100%; height:200px; object-fit:cover; }

.card-content { padding:15px; }

.gallery img {
  width:100%; max-width:600px; margin:10px auto;
  display:block; border-radius:10px;
}

input, textarea, select {
  width:100%; padding:10px; margin:10px 0;
  border-radius:5px; border:1px solid #ccc;
}

footer { background:#111; color:white; text-align:center; padding:20px; }

.whatsapp {
  position:fixed; bottom:20px; right:20px;
  background:#25D366; color:white;
  padding:15px; border-radius:50%;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
<h2>Luxury Rentals</h2>
<nav>
<a href="#home">Home</a>
<a href="#properties">Properties</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero" id="home">
<h1>Find Your Perfect Stay</h1>
<p>Luxury apartments with comfort & affordability</p>
<button class="btn" onclick="document.getElementById('properties').scrollIntoView()">Explore</button>
</section>

<section class="container" id="properties">
<h2 style="text-align:center">Our Properties</h2>

<div class="cards" id="propertiesContainer"></div>

</section>

<section class="container" id="propertyDetail">
<h2 id="title"></h2>

<div class="gallery" id="gallery"></div>

<p id="desc"></p>
<p><b id="price"></b></p>

<h3>Book Now</h3>
<form name="booking" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="booking">

<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="date" name="checkin" required>
<input type="date" name="checkout" required>

<select name="guests">
<option>Guests</option>
<option>1</option>
<option>2</option>
<option>3+</option>
</select>

<button class="btn">Book Now</button>
</form>

<h3>Location</h3>
<iframe src="https://maps.google.com/maps?q=delhi&t=&z=13&ie=UTF8&iwloc=&output=embed"
width="100%" height="300"></iframe>

<h3>Reviews</h3>
<p>⭐️⭐️⭐️⭐️⭐️ Excellent stay!</p>
<p>⭐️⭐️⭐️⭐️ Very comfortable</p>

</section>

<section class="container" id="contact">
<h2>Contact Us</h2>

<form name="contact" method="POST" data-netlify="true">
<input type="hidden" name="form-name" value="contact">

<input type="text" name="name" placeholder="Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message"></textarea>

<button class="btn">Send</button>
</form>

</section>

<footer>
<p>© 2026 Luxury Rentals</p>
</footer>

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">💬</a>

<script>
// Load properties dynamically from CMS JSON
fetch('/properties/properties.json')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('propertiesContainer');

    data.items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <img src="${item.image}">
        <div class="card-content">
          <h3>${item.title}</h3>
          <p>${item.price}</p>
        </div>
      `;

      card.onclick = () => showProperty(
        item.title,
        item.price,
        item.description,
        item.image
      );

      container.appendChild(card);
    });
  });

// Show selected property
function showProperty(title, price, desc, img){
 document.getElementById('title').innerText = title;
 document.getElementById('desc').innerText = desc;
 document.getElementById('price').innerText = price;

 document.getElementById('gallery').innerHTML = `
   <img src="${img}">
 `;

 document.getElementById('propertyDetail').scrollIntoView();
}
</script>

</body>
</html>
